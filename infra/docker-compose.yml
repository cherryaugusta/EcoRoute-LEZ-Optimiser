services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ecoroute
      POSTGRES_USER: ecoroute
      POSTGRES_PASSWORD: ecoroute
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecoroute -d ecoroute"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_SECRET_KEY: "change-me-in-real-deployments"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DATABASE_URL: "postgres://ecoroute:ecoroute@db:5432/ecoroute"
      REDIS_URL: "redis://redis:6379/0"
      CORRELATION_HEADER: "X-Correlation-ID"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  db_data:
